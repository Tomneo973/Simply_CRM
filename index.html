    <nav id="nav" class="flex-1 py-4 overflow-y-auto">
      <div class="px-4 mb-2 text-[.65rem] uppercase tracking-widest text-muted/50 font-semibold">Principal</div>
      <div class="ni on" data-p="dashboard"><i class="fas fa-gauge-high w-5 text-center"></i>Tableau de bord</div>
      <div class="ni" data-p="clients"><i class="fas fa-users w-5 text-center"></i>Clients</div>

      <div class="ni" data-p="factures"><i class="fas fa-file-invoice-dollar w-5 text-center"></i>Factures</div>

   <div class="px-4 mt-4 mb-2 text-[.65rem] uppercase tracking-widest text-muted/50 font-semibold">Projets</div>

   <div class="ni" data-p="signature"><i class="fas fa-signature w-5 text-center"></i>Signatures</div>


      <div class="px-4 mt-4 mb-2 text-[.65rem] uppercase tracking-widest text-muted/50 font-semibold">Finances</div>
      <div class="ni" data-p="achats"><i class="fas fa-cart-shopping w-5 text-center"></i>Achats</div>
      <div class="ni" data-p="bilan"><i class="fas fa-chart-pie w-5 text-center"></i>Bilan annuel</div>
      <div class="px-4 mt-4 mb-2 text-[.65rem] uppercase tracking-widest text-muted/50 font-semibold">Systeme</div>
      <div class="ni" data-p="parametres"><i class="fas fa-cog w-5 text-center"></i>Parametres</div>
    </nav>
    <div class="px-6 py-4 border-t border-border text-[.7rem] text-muted"><div>Stockage local</div><div id="ssize" class="mt-1"></div></div>

      <div class="ml-auto flex items-center gap-2">

        <button class="b bs sm" onclick="FS.save()" title="Sauvegarder vers fichier JSON"><i class="fas fa-save"></i></button>
        <button class="b bs sm" onclick="FS.load()" title="Charger depuis fichier JSON"><i class="fas fa-folder-open"></i></button>
      </div>

    <div id="ct" class="flex-1 p-4 md:p-6"></div>
