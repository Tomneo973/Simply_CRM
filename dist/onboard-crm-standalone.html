.sc::after{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;opacity:.06}

const fm2=n=>new Intl.NumberFormat('fr-CH',{minimumFractionDigits:2,maximumFractionDigits:2}).format(n||0);

const bsg=(s,t)=>{const m={devis:{brouillon:'bdr',envoye:'bi',accepte:'bo',refuse:'bk'},facture:{brouillon:'bdr',envoyee:'bi',payee:'bo',retard:'bk'}};const l={brouillon:'Brouillon',envoye:'Envoye',envoyee:'Envoyee',accepte:'Accepte',refuse:'Refuse',payee:'Payee',retard:'En retard'};return'<span class="badge '+(m[t]?.[s]||'bdr')+'">'+(l[s]||s)+'</span>'};
const tvxOf=it=>{if(it.tauxTVA!=null&&it.tauxTVA!=='')return parseFloat(it.tauxTVA);if(it.totalHT)return Math.round(it.totalTVA/it.totalHT*10000)/100;return gSt().tva||20};

<script>
// js/core/filesystem.js
const FS={
  h:null,ls:null,
  _all(){const d={};Object.values(K).forEach(k=>{try{d[k]=JSON.parse(localStorage.getItem(k))}catch(e){d[k]=null}});return d},
  _load(d){Object.entries(d).forEach(([k,v])=>{if(v!=null)localStorage.setItem(k,JSON.stringify(v))})},
  async save(){
    const j=JSON.stringify(this._all(),null,2);
    if(this.h){try{if((await this.h.queryPermission({mode:'readwrite'}))!=='granted')await this.h.requestPermission({mode:'readwrite'});const w=await this.h.createWritable();await w.write(j);await w.close();this._ok('Sauvegarde reussie');return}catch(e){this.h=null}}
    if('showSaveFilePicker' in window){try{this.h=await window.showSaveFilePicker({suggestedName:'onboard-crm.json',types:[{description:'JSON',accept:{'application/json':['.json']}}]});const w=await this.h.createWritable();await w.write(j);await w.close();this._ok('Fichier cree');return}catch(e){if(e.name!=='AbortError')toast('Erreur','error');return}}
    const b=new Blob([j],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='onboard-crm.json';a.click();this._ok('Fichier telecharge');
  },
  async load(){
    if('showOpenFilePicker' in window){try{const[h]=await window.showOpenFilePicker({types:[{description:'JSON',accept:{'application/json':['.json']}}]});this._read(await(await h.getFile()).text());this.h=h;return}catch(e){if(e.name!=='AbortError')toast('Erreur','error');return}}
    const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];if(f){const r=new FileReader();r.onload=ev=>this._read(ev.target.result);r.readAsText(f)}};i.click();
  },
  _read(t){try{this._load(JSON.parse(t));migratePjData();this.ls=new Date();updSi();toast('Donnees chargees','success');render()}catch(e){toast('JSON invalide','error')}},
  _ok(m){this.ls=new Date();updSi();toast(m,'success')}
};
function updSi(){const e=document.getElementById('sind');if(!e)return;if(FS.ls){e.textContent='Sauvegarde : '+FS.ls.toLocaleTimeString('fr-FR');e.style.color='#2ECC71'}else{e.textContent='Non sauvegarde en fichier';e.style.color='#F39C12'}}
</script>

function handleHash(){
  const h=window.location.hash.slice(1)||'dashboard';
  if(h.startsWith('val=')){renderCVal(h.split('val=')[1]);return}
  if(h.startsWith('sign=')){renderCSig(h.split('sign=')[1]);return}

  if(h.startsWith('sigresp=')){importSResp(h.split('sigresp=')[1]);return}
  const parts=h.split('/');pg=parts[0];pp=parts[1]?{id:parts[1]}:{};render();
}

function render(){
  showA();
  document.querySelectorAll('.ni').forEach(n=>n.classList.toggle('on',n.dataset.p===pg));
  const tl={dashboard:'Tableau de bord',clients:'Clients',devis:'Devis',factures:'Factures',projets:'Projets',signature:'Signatures',parametres:'Parametres',achats:'Achats',bilan:'Bilan annuel'};
  document.getElementById('ptitle').textContent=tl[pg]||'';

  let t=0;for(let k in localStorage)t+=localStorage[k].length*2;

<!-- Feature modules -->
<script>
/* === QR-FACTURE (Swiss QR-bill) === */
if(window.qrcode)qrcode.stringToBytes=qrcode.stringToBytesFuncs['UTF-8'];
function ibanClean(v){return(v||'').replace(/\s+/g,'').toUpperCase()}
function ibanValid(v){
  const iban=ibanClean(v);
  if(!/^[A-Z0-9]{15,34}$/.test(iban))return false;
  const r=iban.slice(4)+iban.slice(0,4);
  const num=r.split('').map(ch=>{const c=ch.charCodeAt(0);return(c>=65&&c<=90)?(c-55):ch}).join('');
  let rem=0;for(let i=0;i<num.length;i++){rem=(rem*10+parseInt(num[i],10))%97}
  return rem===1;
}
function isQrIban(v){const iban=ibanClean(v);if(!/^(CH|LI)/.test(iban))return false;const clr=parseInt(iban.slice(4,9),10);return clr>=30000&&clr<=31999}
function fmtIban(v){return ibanClean(v).replace(/(.{4})/g,'$1 ').trim()}
function fmtRef(v){return(v||'').replace(/(.{5})/g,'$1 ').trim()}
function mod10Check(digits){
  const T=[[0,9,4,6,8,2,7,1,3,5],[9,4,6,8,2,7,1,3,5,0],[4,6,8,2,7,1,3,5,0,9],[6,8,2,7,1,3,5,0,9,4],[8,2,7,1,3,5,0,9,4,6],[2,7,1,3,5,0,9,4,6,8],[7,1,3,5,0,9,4,6,8,2],[1,3,5,0,9,4,6,8,2,7],[3,5,0,9,4,6,8,2,7,1],[5,0,9,4,6,8,2,7,1,3]];
  let carry=0;for(const d of String(digits))carry=T[carry][parseInt(d,10)];
  return(10-carry)%10;
}
function genQRR(numero){const d=(numero||'').replace(/\D/g,'').slice(-26).padStart(26,'0');return d+mod10Check(d)}
function buildSPC(item,type,cl,st){
  const iban=ibanClean(st.iban);
  if(!iban)return null;
  const L=[];
  L.push('SPC','0200','1',iban);
  L.push('S',st.titulaire||st.nom||'',st.rue||'',st.rueNo||'',st.npa||'',st.ville||'',(st.pays||'CH').toUpperCase());
  L.push('','','','','','','');
  const amt=(item.totalTTC||0).toFixed(2),dev=item.devise||st.devise||'CHF';
  L.push(amt,dev);
  const hasDebtor=!!(cl&&cl.rue&&cl.npa&&cl.ville);
  if(hasDebtor)L.push('S',cl.nom||'',cl.rue||'',cl.rueNo||'',cl.npa||'',cl.ville||'',(cl.pays||'CH').toUpperCase());
  else L.push('','','','','','','');
  const qrIban=isQrIban(iban),refType=qrIban?'QRR':'NON',ref=qrIban?genQRR(item.numero):'';
  L.push(refType,ref);
  let msg=(type==='devis'?'Devis ':'Facture ')+(item.numero||'')+(type==='devis'?' - offre, ne constitue pas une facture':'');
  L.push(msg.slice(0,140));
  L.push('EPD');
  return L.join('\n');
}
function qrBillHTML(item,type,cl,st){
  const spc=buildSPC(item,type,cl,st);
  if(!spc||!window.qrcode)return null;
  const qr=qrcode(0,'M');qr.addData(spc,'Byte');qr.make();
  const qrImgSrc=qr.createDataURL(8,16);
  const qrImg='<img src="'+qrImgSrc+'" style="display:block;width:100%;height:100%;image-rendering:pixelated" alt="QR-facture">';
  const iban=ibanClean(st.iban),cName=st.titulaire||st.nom||'';
  const cAddr=[((st.rue||'')+' '+(st.rueNo||'')).trim(),((st.npa||'')+' '+(st.ville||'')).trim()].filter(x=>x).join('<br>');
  const amt=fm2(item.totalTTC),dev=item.devise||st.devise||'CHF';
  const qrIban=isQrIban(iban),ref=qrIban?fmtRef(genQRR(item.numero)):'';
  const hasDebtor=!!(cl&&cl.rue&&cl.npa&&cl.ville);
  const dAddr=hasDebtor?((cl.nom||'')+'<br>'+(cl.rue||'')+' '+(cl.rueNo||'')+'<br>'+(cl.npa||'')+' '+(cl.ville||'')):'';
  const isDevis=type==='devis';
  const msg=isDevis?'Devis '+item.numero+' - offre, ne constitue pas une facture':'Facture '+item.numero;
  const watermark=isDevis?'<div style="position:absolute;top:38%;left:28%;transform:translate(-50%,-50%) rotate(-22deg);font-size:26pt;font-weight:800;color:rgba(190,30,30,.15);letter-spacing:3px;pointer-events:none;white-space:nowrap;z-index:2;">PROVISOIRE</div>':'';
  return'<div style="position:relative;width:210mm;min-height:105mm;display:flex;background:#fff;color:#000;font-family:Helvetica,Arial,sans-serif;border-top:1px solid #000;box-sizing:border-box;overflow:hidden;">'
    +watermark
    +'<div style="position:absolute;top:-3.8mm;left:5mm;font-size:11pt;">&#9986;</div>'
    +'<div style="width:62mm;padding:5mm;box-sizing:border-box;border-right:1px dashed #000;display:flex;flex-direction:column;">'
      +'<div style="font-size:11pt;font-weight:700;margin-bottom:4mm;">Recepisse</div>'
      +'<div style="font-size:6pt;font-weight:700;">Compte / Payable a</div>'
      +'<div style="font-size:8pt;line-height:1.35;margin-bottom:2mm;">'+fmtIban(iban)+'<br>'+cName+(cAddr?'<br>'+cAddr:'')+'</div>'
      +(ref?'<div style="font-size:6pt;font-weight:700;">Reference</div><div style="font-size:8pt;margin-bottom:2mm;">'+ref+'</div>':'')
      +'<div style="font-size:6pt;font-weight:700;">Payable par'+(hasDebtor?'':' (nom/adresse)')+'</div>'
      +'<div style="font-size:8pt;line-height:1.35;min-height:8mm;">'+dAddr+'</div>'
      +'<div style="flex:1"></div>'
      +'<div style="display:flex;gap:6mm;margin-top:2mm;"><div><div style="font-size:6pt;font-weight:700;">Monnaie</div><div style="font-size:8pt;">'+dev+'</div></div><div><div style="font-size:6pt;font-weight:700;">Montant</div><div style="font-size:8pt;">'+amt+'</div></div></div>'
      +'<div style="text-align:right;font-size:6pt;font-weight:700;margin-top:4mm;">Point de depot</div>'
    +'</div>'

<script>

function csvEsc(v){v=v==null?'':String(v);return/[;"\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v}
function toCSV(rows,headers){const lines=[headers.map(h=>csvEsc(h.label)).join(';')];rows.forEach(r=>lines.push(headers.map(h=>csvEsc(h.get(r))).join(';')));return'\uFEFF'+lines.join('\r\n')}
function downloadCSV(filename,content){const blob=new Blob([content],{type:'text/csv;charset=utf-8;'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url)}
function inRange(d,start,end){if(!d)return!start&&!end;if(start&&d<start)return!1;if(end&&d>end)return!1;return!0}
function expDevisCSV(start,end){
  const cl=gd(K.cl);const rows=gd(K.dv).filter(d=>inRange(d.date,start,end)).sort((a,b)=>(a.date||'').localeCompare(b.date||''));

}
function expFacturesCSV(start,end){

function expAchatsCSV(start,end){

<script>

function lnH(l,i){return'<div class="lr" data-i="'+i+'"><input class="ip" name="d'+i+'" placeholder="Description" value="'+(l.description||'').replace(/"/g,'&quot;')+'" oninput="updT()"><input class="ip mh" name="q'+i+'" type="number" min="0" step="0.01" value="'+(l.quantite||1)+'" oninput="updT()"><input class="ip mh" name="p'+i+'" type="number" min="0" step="0.01" value="'+(l.prixUnitaire||0)+'" oninput="updT()"><div class="mh text-sm text-right font-medium" id="t'+i+'">'+fm((l.quantite||1)*(l.prixUnitaire||0))+'</div><button type="button" class="b bd sm" onclick="rmLn(this)"><i class="fas fa-times"></i></button></div>'}
function addLn(){const c=document.getElementById('lc');c.insertAdjacentHTML('beforeend',lnH({description:'',quantite:1,prixUnitaire:0},c.children.length));updT()}
function rmLn(b){const c=document.getElementById('lc');if(c.children.length<=1)return;b.closest('.lr').remove();c.querySelectorAll('.lr').forEach((r,i)=>{r.dataset.i=i;r.querySelectorAll('input').forEach((inp,j)=>{inp.name=['d','q','p'][j]+i});const lt=r.querySelector('[id^=t]');if(lt)lt.id='t'+i});updT()}

function updT(){const a=getLn();const h=a.reduce((s,l)=>s+l.total,0);const txEl=document.getElementById('tvxr');const tx=txEl?(parseFloat(txEl.value)||0):(gSt().tva||20);const tv=h*tx/100;const devEl=document.getElementById('dvsel');const dv=devEl?devEl.value:(gSt().devise||'CHF');a.forEach((l,i)=>{const e=document.getElementById('t'+i);if(e)e.textContent=fm(l.total,dv)});const d=document.getElementById('td');if(d)d.innerHTML='<div class="flex justify-between"><span class="text-muted">HT</span><span>'+fm(h,dv)+'</span></div><div class="flex justify-between"><span class="text-muted">TVA ('+tx+'%)</span><span>'+fm(tv,dv)+'</span></div><div class="flex justify-between text-lg font-bold border-t border-border pt-1 mt-1"><span>TTC</span><span class="text-accent">'+fm(h+tv,dv)+'</span></div>'}
function chSt(t,id,s){const k=t==='dv'?K.dv:K.fc;sd(k,gd(k).map(x=>x.id===id?{...x,statut:s}:x));toast('Statut mis a jour','success');render()}

</script>

<script>
// js/modules/projets.js
/* === PROJETS (fusion retroplanning + validation) === */
const pjStL = { en_attente: 'A valider', en_cours: 'En cours', valide: 'Valide', rejete: 'Rejete' };
const pjStB = { en_attente: 'bw', en_cours: 'bi', valide: 'bo', rejete: 'bk' };
const pjStC = {
  en_attente: 'background:rgba(107,112,137,.15);border:1px solid rgba(107,112,137,.3);color:#6B7089',
  en_cours: 'background:rgba(52,152,219,.15);border:1px solid rgba(52,152,219,.3);color:#3498DB',
  valide: 'background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.3);color:#2ECC71',
  rejete: 'background:rgba(231,76,60,.15);border:1px solid rgba(231,76,60,.3);color:#E74C3C'
};

function pjStats(p){
  const t=p.etapes.length;
  const va=p.etapes.filter(e=>e.statut==='valide').length;
  const at=p.etapes.filter(e=>e.statut==='en_attente').length;
  const ec=p.etapes.filter(e=>e.statut==='en_cours').length;
  const re=p.etapes.filter(e=>e.statut==='rejete').length;
  return {t,va,at,ec,re,pc:t?Math.round(va/t*100):0};
}

/* --- Migration depuis les anciennes donnees retroplanning (crm_rt) + validation (crm_vl) --- */
function migratePjData(){
  const rt=gd(K.rt), vl=gd(K.vl);
  if(!rt.length && !vl.length) return;
  let pj=gd(K.pj);
  const doneRt=new Set(pj.filter(p=>p._fromRt).map(p=>p._fromRt));
  const doneVl=new Set(pj.flatMap(p=>p._fromVl||[]));
  const usedVl=new Set();
  let changed=false;
  rt.forEach(r=>{
    if(doneRt.has(r.id))return;
    const etapes=(r.etapes||[]).map(e=>({
      id:uid(), nom:e.nom||'', description:'', dateDebut:e.dateDebut||'', dateFin:e.dateFin||'',
      statut:e.statut==='termine'?'valide':(e.statut==='en_cours'?'en_cours':'en_attente'),
      validePar:'', dateValidation:''
    }));
    const match=vl.find(v=>!usedVl.has(v.id) && !doneVl.has(v.id) && v.clientId===r.clientId && v.projetNom && r.nom && v.projetNom.toLowerCase()===r.nom.toLowerCase());
    if(match){
      usedVl.add(match.id);
      (match.points||[]).forEach(pt=>{
        const em=etapes.find(e=>e.nom.toLowerCase()===(pt.titre||'').toLowerCase());
        const st=pt.statut==='valide'?'valide':(pt.statut==='rejete'?'rejete':null);
        if(em){
          em.description=pt.description||'';
          if(st)em.statut=st;
          em.validePar=pt.validePar||'';
          em.dateValidation=pt.dateValidation||'';
        }else{
          etapes.push({id:uid(),nom:pt.titre||'',description:pt.description||'',dateDebut:'',dateFin:'',statut:st||'en_attente',validePar:pt.validePar||'',dateValidation:pt.dateValidation||''});
        }
      });
    }
    pj.push({id:uid(),nom:r.nom||'Projet',clientId:r.clientId,etapes,_fromRt:r.id,_fromVl:match?[match.id]:[]});
    changed=true;
  });
  vl.forEach(v=>{
    if(doneVl.has(v.id) || usedVl.has(v.id))return;
    pj.push({
      id:uid(), nom:v.projetNom||'Projet', clientId:v.clientId,
      etapes:(v.points||[]).map(pt=>({
        id:uid(), nom:pt.titre||'', description:pt.description||'', dateDebut:'', dateFin:'',
        statut:pt.statut==='valide'?'valide':(pt.statut==='rejete'?'rejete':'en_attente'),
        validePar:pt.validePar||'', dateValidation:pt.dateValidation||''
      })),
      _fromVl:[v.id]
    });
    changed=true;
  });
  if(changed) sd(K.pj, pj);
}

function pjSetSt(pid,eid,val){
  sd(K.pj, gd(K.pj).map(p=>p.id===pid?{...p,etapes:p.etapes.map(e=>{
    if(e.id!==eid) return e;
    const patch = (val==='valide'||val==='rejete') ? {validePar:e.validePar||'(interne)', dateValidation:new Date().toISOString()} : {};
    return {...e, statut:val, ...patch};
  })}:p));
  toast('Statut mis a jour','success');
  render();
}
function pjGanttHTML(p){
  const legend='<div class="flex flex-wrap gap-3 mb-4 text-xs">'+Object.keys(pjStL).map(k=>'<span class="flex items-center gap-1"><span style="display:inline-block;width:10px;height:10px;border-radius:3px;'+pjStC[k]+'"></span>'+pjStL[k]+'</span>').join('')+'</div>';
  if(!p.etapes.length) return legend+'<div class="cd es"><i class="fas fa-chart-gantt block"></i>Aucune etape.</div>';
  const ds=p.etapes.map(e=>[e.dateDebut,e.dateFin].filter(Boolean).map(d=>new Date(d).getTime())).flat();
  const mn=ds.length?Math.min(...ds):Date.now(), mx=ds.length?Math.max(...ds):Date.now()+864e5, rng=Math.max(mx-mn,864e5);
  const now=Date.now();
  const nowPc = (now>=mn && now<=mx) ? ((now-mn)/rng)*100 : null;
  return legend+'<div class="cd overflow-x-auto"><div style="min-width:700px;position:relative">'
    +(nowPc!=null?'<div style="position:absolute;left:'+nowPc+'%;top:0;bottom:0;width:2px;background:rgb(var(--c-accent));z-index:1" title="Aujourd\'hui"></div>':'')
    +p.etapes.map(e=>{
      const st=e.dateDebut?new Date(e.dateDebut).getTime():mn;
      const en=e.dateFin?new Date(e.dateFin).getTime():st+864e5*3;
      const l=Math.max(0,((st-mn)/rng)*100), w=Math.max(3,((en-st)/rng)*100);
      return '<div class="flex items-center gap-4 mb-3" style="min-height:40px">'
        +'<div class="w-48 flex-shrink-0"><div class="text-sm font-medium truncate">'+(e.nom||'Etape')+'</div><div class="text-xs text-muted">'+fd(e.dateDebut)+' - '+fd(e.dateFin)+'</div></div>'
        +'<div class="flex-1 relative h-10"><div class="gb" style="left:'+l+'%;width:'+w+'%;'+pjStC[e.statut]+'">'+(e.nom||'')+'</div></div>'
        +'<select class="ip w-32 text-xs py-1" onchange="pjSetSt(\''+p.id+'\',\''+e.id+'\',this.value)">'
          +'<option value="en_attente" '+(e.statut==='en_attente'?'selected':'')+'>A valider</option>'
          +'<option value="en_cours" '+(e.statut==='en_cours'?'selected':'')+'>En cours</option>'
          +'<option value="valide" '+(e.statut==='valide'?'selected':'')+'>Valide</option>'
          +'<option value="rejete" '+(e.statut==='rejete'?'selected':'')+'>Rejete</option>'
        +'</select></div>';
    }).join('')
  +'</div></div>';
}
function pjValHTML(p){
  const si={en_attente:'fa-clock text-warning', en_cours:'fa-hourglass-half text-info', valide:'fa-check-circle text-success', rejete:'fa-times-circle text-danger'};
  if(!p.etapes.length) return '<div class="cd es"><i class="fas fa-check-double block"></i>Aucune etape.</div>';
  return '<div class="space-y-3">'+p.etapes.map(e=>
    '<div class="cd flex flex-col md:flex-row md:items-center justify-between gap-3"><div class="flex-1"><div class="flex items-center gap-2 mb-1"><i class="fas '+si[e.statut]+'"></i><h4 class="font-semibold">'+e.nom+'</h4></div>'+(e.description?'<p class="text-sm text-muted">'+e.description+'</p>':'')+'</div><div class="flex items-center gap-3"><span class="badge '+pjStB[e.statut]+'">'+pjStL[e.statut]+'</span>'+(e.validePar?'<div class="text-right text-xs text-muted"><div>par '+e.validePar+'</div><div>'+(e.dateValidation?new Date(e.dateValidation).toLocaleString('fr-FR'):'')+'</div></div>':'')+'</div></div>'
  ).join('')+'</div>';
}

/* --- Lien client / import de reponse (le portail public reste dans portal.js, inchange) --- */
function genPjVL(pid){
  const p=gd(K.pj).find(x=>x.id===pid); if(!p) return;
  const pl=btoa(unescape(encodeURIComponent(JSON.stringify({v:pid, n:p.nom, p:p.etapes.map(e=>({id:e.id,t:e.nom,d:e.description}))}))));
  const url=location.origin+location.pathname+'#val='+pl;
  showM('Lien de validation','<p class="text-sm text-muted mb-3">Envoyez ce lien au client :</p><input class="ip font-mono text-xs mb-3" value="'+url+'" readonly onclick="this.select()" id="vli"><div class="flex gap-2"><button class="b bp sm" onclick="navigator.clipboard.writeText(document.getElementById(\'vli\').value);toast(\'Copie\',\'success\')"><i class="fas fa-copy"></i> Copier</button></div><div class="mt-4 p-3 bg-surface2 rounded-lg text-xs text-muted"><strong>Processus :</strong><ol class="list-decimal ml-4 mt-1 space-y-1"><li>Envoyez le lien au client</li><li>Il valide/rejette les etapes</li><li>Il vous renvoie le lien de reponse</li><li>Cliquez "Importer une reponse" et collez le lien</li></ol></div>');
}
function impPjVR(){
  showM('Importer une reponse','<p class="text-sm text-muted mb-3">Collez le lien de reponse du client :</p><input class="ip font-mono text-xs mb-4" id="ri"><div class="flex gap-3 justify-end"><button class="b bs" onclick="closeM()">Annuler</button><button class="b bp" onclick="procPjVR()">Importer</button></div>');
}
function importVResp(enc){
  impPjVR();
  setTimeout(()=>{ const i=document.getElementById('ri'); if(i) i.value='#resp='+enc; }, 100);
}
function procPjVR(){
  let v=document.getElementById('ri').value.trim();
  if(v.includes('#resp=')) v=v.split('#resp=')[1];
  try{
    const d=JSON.parse(decodeURIComponent(escape(atob(v))));
    const a=gd(K.pj);
    const i=a.findIndex(x=>x.id===d.v);
    if(i===-1){ toast('Projet introuvable','error'); return; }
    d.r.forEach(r=>{
      if(r.s!=='valide' && r.s!=='rejete') return; // on ignore les etapes que le client n'a pas traitees
      const ei=a[i].etapes.findIndex(e=>e.id===r.id);
      if(ei!==-1){ a[i].etapes[ei].statut=r.s; a[i].etapes[ei].validePar=r.n; a[i].etapes[ei].dateValidation=r.d; }
    });
    sd(K.pj,a);
    closeM();
    toast('Reponse importee !','success');
    render();
  }catch(e){ toast('Lien invalide','error'); }
}

<script>
/* === SIGNATURES === */
function rSig(C){
  const cl=gd(K.cl),sg=gs(K.sg);const en=Object.entries(sg);
  C.innerHTML='<div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="cd"><h3 class="font-semibold mb-4">Capturer une signature</h3><div class="mb-4"><label>Client</label><select class="ip" id="scl"><option value="">Selectionner...</option>'+cl.map(c=>'<option value="'+c.id+'">'+c.nom+'</option>').join('')+'</select></div><div class="border-2 border-dashed border-border rounded-xl overflow-hidden mb-4 bg-surface2 relative"><canvas id="scv" width="500" height="200" class="w-full cursor-crosshair" style="touch-action:none"></canvas><div id="sph" class="absolute inset-0 flex items-center justify-center text-muted text-sm pointer-events-none">Signez ici</div></div><div class="flex gap-3"><button class="b bs" id="sclr"><i class="fas fa-eraser"></i> Effacer</button><button class="b bp" id="ssav"><i class="fas fa-save"></i> Enregistrer</button></div></div><div class="cd"><h3 class="font-semibold mb-4">Signatures ('+en.length+')</h3>'+(en.length?'<div class="space-y-3">'+en.map(([cid,sig])=>{const c=cl.find(x=>x.id===cid);return'<div class="flex items-center justify-between p-3 bg-surface2 rounded-lg"><div class="flex items-center gap-3"><img src="'+sig+'" class="h-12 bg-white rounded p-1"><div><div class="text-sm font-medium">'+(c?.nom||'Inconnu')+'</div><div class="text-xs text-muted">'+(c?.entreprise||'')+'</div></div></div><div class="flex gap-2"><button class="b bs sm" onclick="genSL(\''+cid+'\')"><i class="fas fa-link"></i></button><button class="b bd sm" onclick="delS(\''+cid+'\')"><i class="fas fa-trash"></i></button></div></div>'}).join('')+'</div>':'<div class="text-muted text-sm text-center py-8">Aucune signature</div>')+'</div></div>';
  initSC();
  C.querySelector('#sclr').onclick=()=>{const cv=document.getElementById('scv');cv.getContext('2d').clearRect(0,0,cv.width,cv.height);document.getElementById('sph').style.display='flex'};
  C.querySelector('#ssav').onclick=()=>{const cid=document.getElementById('scl').value;if(!cid){toast('Selectionnez un client','error');return}const cv=document.getElementById('scv');const bk=document.createElement('canvas');bk.width=cv.width;bk.height=cv.height;if(cv.toDataURL()===bk.toDataURL()){toast('Signez d\'abord','error');return}const s=gs(K.sg);s[cid]=cv.toDataURL('image/jpeg',0.7);ss(K.sg,s);toast('Signature enregistree','success');rSig(C)};
}
function initSC(){const cv=document.getElementById('scv');if(!cv)return;const cx=cv.getContext('2d');cx.strokeStyle='#E8A832';cx.lineWidth=2.5;cx.lineCap='round';cx.lineJoin='round';let dr=false;const gp=e=>{const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(cv.width/r.width),y:(t.clientY-r.top)*(cv.height/r.height)}};const st=e=>{e.preventDefault();dr=true;const p=gp(e);cx.beginPath();cx.moveTo(p.x,p.y);document.getElementById('sph').style.display='none'};const mv=e=>{if(!dr)return;e.preventDefault();const p=gp(e);cx.lineTo(p.x,p.y);cx.stroke()};const ed=()=>dr=false;cv.onmousedown=st;cv.onmousemove=mv;cv.onmouseup=ed;cv.onmouseleave=ed;cv.ontouchstart=st;cv.ontouchmove=mv;cv.ontouchend=ed}
function delS(cid){const s=gs(K.sg);delete s[cid];ss(K.sg,s);toast('Supprimee','success');rSig(document.getElementById('ct'))}
function genSL(cid){const cl=gd(K.cl);const c=cl.find(x=>x.id===cid);if(!c)return;const pl=btoa(unescape(encodeURIComponent(JSON.stringify({c:cid,n:c.nom}))));const url=location.origin+location.pathname+'#sign='+pl;showM('Lien de signature','<p class="text-sm text-muted mb-3">Envoyez ce lien a <strong>'+c.nom+'</strong> :</p><input class="ip font-mono text-xs" value="'+url+'" readonly onclick="this.select()" id="sli"><div class="flex gap-2 mt-4"><button class="b bp sm" onclick="navigator.clipboard.writeText(document.getElementById(\'sli\').value);toast(\'Copie\',\'success\')"><i class="fas fa-copy"></i> Copier</button></div>')}

</script>


<script>
/* === ACHATS === */
const acCat={charges_sociales:'Charges sociales',materiel:'Materiel',fournisseur:'Facture fournisseur',autre:'Autre'};
function rAc(C){

<script>
/* === BILAN ANNUEL === */
function yrOf(d){return d?d.split('-')[0]:null}
function sumByDev(list,field){const o={};list.forEach(x=>{const d=x.devise||'CHF';o[d]=(o[d]||0)+(x[field]||0)});return o}
function fmMulti(o){const k=Object.keys(o);if(!k.length)return fm(0,gSt().devise||'CHF');return k.map(c=>fm(o[c],c)).join(' + ')}
function rBil(C){
  const fc=gd(K.fc),ac=gd(K.ac);
  const yrs=Array.from(new Set([...fc.map(f=>yrOf(f.date)),...ac.map(x=>yrOf(x.date))].filter(Boolean))).sort((a,b)=>b-a);
  if(!yrs.length){C.innerHTML='<div class="es"><i class="fas fa-chart-pie block"></i>Aucune donnee. Creez une facture ou un achat pour voir apparaitre un bilan annuel.</div>';return}

    const fy=fc.filter(f=>yrOf(f.date)===y),ay=ac.filter(x=>yrOf(x.date)===y);
    const caByDev=sumByDev(fy,'totalTTC'),encByDev=sumByDev(fy.filter(f=>f.statut==='payee'),'totalTTC');
    const acht=ay.reduce((s,x)=>s+(parseFloat(x.montant)||0),0);
    const devDef=gSt().devise||'CHF';
    const netSingle=Object.keys(encByDev).length<=1?fm((encByDev[devDef]||Object.values(encByDev)[0]||0)-acht,Object.keys(encByDev)[0]||devDef):null;
    return'<div class="cd cursor-pointer hover:border-accent/30 transition-colors" onclick="nav(\'bilan\',{id:\''+y+'\'})"><div class="flex items-center justify-between mb-3"><h3 class="text-xl font-bold">'+y+'</h3><i class="fas fa-chevron-right text-muted"></i></div><div class="space-y-2 text-sm"><div class="flex justify-between gap-3"><span class="text-muted">Facture ('+fy.length+')</span><span class="font-medium text-right">'+fmMulti(caByDev)+'</span></div><div class="flex justify-between gap-3"><span class="text-muted">Encaisse</span><span class="font-medium text-success text-right">'+fmMulti(encByDev)+'</span></div><div class="flex justify-between"><span class="text-muted">Achats ('+ay.length+')</span><span class="font-medium text-danger">'+fm(acht,devDef)+'</span></div><div class="flex justify-between pt-2 border-t border-border"><span class="font-semibold">Resultat</span>'+(netSingle?'<span class="font-bold '+((encByDev[devDef]||0)-acht>=0?'text-success':'text-danger')+'">'+netSingle+'</span>':'<span class="text-xs text-muted">voir detail</span>')+'</div></div></div>';
  }).join('')+'</div>';
}
function rBilV(C,year){
  const fc=gd(K.fc).filter(f=>yrOf(f.date)===year),ac=gd(K.ac).filter(x=>yrOf(x.date)===year),cl=gd(K.cl);
  document.getElementById('ptitle').textContent='Bilan '+year;
  const htByDev=sumByDev(fc,'totalHT'),tvaByDev=sumByDev(fc,'totalTVA'),ttcByDev=sumByDev(fc,'totalTTC');
  const encByDev=sumByDev(fc.filter(f=>f.statut==='payee'),'totalTTC');
  const attByDev=sumByDev(fc.filter(f=>f.statut==='envoyee'||f.statut==='retard'),'totalTTC');
  const totAch=ac.reduce((s,x)=>s+(parseFloat(x.montant)||0),0),devDef=gSt().devise||'CHF';
  const multiDev=Object.keys(ttcByDev).length>1;
  const byCat={};ac.forEach(x=>{byCat[x.categorie]=(byCat[x.categorie]||0)+(parseFloat(x.montant)||0)});
  C.innerHTML='<button class="b bs mb-4" onclick="nav(\'bilan\')"><i class="fas fa-arrow-left"></i> Retour</button><div class="flex flex-wrap gap-2 mb-4"><button class="b bs" onclick="expFacturesCSV(\''+year+'-01-01\',\''+year+'-12-31\')"><i class="fas fa-file-csv"></i> Export factures '+year+'</button><button class="b bs" onclick="expAchatsCSV(\''+year+'-01-01\',\''+year+'-12-31\')"><i class="fas fa-file-csv"></i> Export achats '+year+'</button></div>'
    +(multiDev?'<div class="cd mb-4 text-sm text-muted"><i class="fas fa-circle-info mr-1"></i>Plusieurs devises detectees cette annee : les totaux sont detailles par devise (aucun mélange CHF/EUR).</div>':'')
    +'<div class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-4 gap-4 mb-8"><div class="sc bl"><div class="text-muted text-xs font-semibold uppercase tracking-wider mb-1">CA facture HT</div><div class="text-xl font-bold text-fg">'+fmMulti(htByDev)+'</div></div><div class="sc g"><div class="text-muted text-xs font-semibold uppercase tracking-wider mb-1">Encaisse</div><div class="text-xl font-bold text-fg">'+fmMulti(encByDev)+'</div></div><div class="sc r"><div class="text-muted text-xs font-semibold uppercase tracking-wider mb-1">Achats / charges</div><div class="text-xl font-bold text-fg">'+fm(totAch,devDef)+'</div></div><div class="sc a"><div class="text-muted text-xs font-semibold uppercase tracking-wider mb-1">Resultat (encaisse - achats)</div><div class="text-xl font-bold '+((encByDev[devDef]||0)-totAch>=0?'text-success':'text-danger')+'">'+fm((encByDev[devDef]||Object.values(encByDev)[0]||0)-totAch,Object.keys(encByDev)[0]||devDef)+(multiDev?' <span class="text-xs font-normal text-muted">(devise principale uniquement)</span>':'')+'</div></div></div><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="cd"><h3 class="font-semibold mb-4">Factures '+year+' ('+fc.length+')</h3>'+(fc.length?'<table><thead><tr><th>Numero</th><th>Client</th><th>Date</th><th class="text-right">TTC</th><th>Statut</th></tr></thead><tbody>'+fc.map(f=>{const c=cl.find(x=>x.id===f.clientId);return'<tr class="cursor-pointer" onclick="nav(\'factures\',{id:\''+f.id+'\'})"><td class="font-mono text-accent text-xs">'+f.numero+'</td><td>'+(c?.nom||'-')+'</td><td class="text-muted text-sm">'+fd(f.date)+'</td><td class="text-right">'+fm(f.totalTTC,f.devise)+'</td><td>'+bsg(f.statut,'facture')+'</td></tr>'}).join('')+'</tbody></table>':'<p class="text-muted text-sm">Aucune facture cette annee</p>')+'<div class="mt-4 pt-4 border-t border-border text-sm space-y-1"><div class="flex justify-between gap-3"><span class="text-muted">Total TVA</span><span class="text-right">'+fmMulti(tvaByDev)+'</span></div><div class="flex justify-between gap-3"><span class="text-muted">Total TTC</span><span class="text-right">'+fmMulti(ttcByDev)+'</span></div><div class="flex justify-between gap-3"><span class="text-muted">Encaisse</span><span class="text-right">'+fmMulti(encByDev)+'</span></div><div class="flex justify-between gap-3"><span class="text-muted">En attente</span><span class="text-right">'+fmMulti(attByDev)+'</span></div></div></div><div class="cd"><h3 class="font-semibold mb-4">Achats '+year+' ('+ac.length+')</h3>'+(ac.length?'<table><thead><tr><th>Date</th><th>Categorie</th><th>Libelle</th><th class="text-right">Montant</th></tr></thead><tbody>'+ac.map(x=>'<tr><td class="text-muted text-sm">'+fd(x.date)+'</td><td><span class="badge bdr">'+(acCat[x.categorie]||x.categorie)+'</span></td><td>'+(x.libelle||'-')+'</td><td class="text-right">'+fm(x.montant,devDef)+'</td></tr>').join('')+'</tbody></table>':'<p class="text-muted text-sm">Aucun achat cette annee</p>')+'<div class="mt-4 pt-4 border-t border-border text-sm space-y-1">'+Object.entries(byCat).map(([k,v])=>'<div class="flex justify-between"><span class="text-muted">'+(acCat[k]||k)+'</span><span>'+fm(v,devDef)+'</span></div>').join('')+'<div class="flex justify-between font-semibold pt-1"><span>Total</span><span>'+fm(totAch,devDef)+'</span></div></div></div></div>';
}

</script>
<script>

function renderCVal(enc){
  try{const d=JSON.parse(decodeURIComponent(escape(atob(enc))));showP('<div class="min-h-screen flex items-center justify-center p-4" style="background:linear-gradient(135deg,#f8f7f4,#eee9e0)"><div class="pc w-full max-w-2xl"><div class="text-center mb-8"><div class="w-12 h-12 rounded-xl bg-amber-100 flex items-center justify-center mx-auto mb-3"><i class="fas fa-check-double text-amber-600 text-xl"></i></div><h1 class="text-2xl font-bold text-gray-900">'+d.n+'</h1><p class="text-gray-500 text-sm mt-1">Merci de valider les points suivants</p></div><div class="space-y-4 mb-8" id="cpp">'+d.p.map(p=>'<div class="border border-gray-200 rounded-xl p-4" data-pid="'+p.id+'"><h3 class="font-semibold text-gray-900 mb-1">'+p.t+'</h3>'+(p.d?'<p class="text-sm text-gray-500 mb-3">'+p.d+'</p>':'<div class="mb-3"></div>')+'<div class="flex gap-2" id="cb_'+p.id+'"><button class="pb ps" onclick="cpV(\''+p.id+'\',\'valide\')"><i class="fas fa-check mr-1"></i> Valider</button><button class="pb pd" onclick="cpV(\''+p.id+'\',\'rejete\')"><i class="fas fa-times mr-1"></i> Rejeter</button></div><div id="cs_'+p.id+'" class="hidden mt-2 text-sm font-medium"></div></div>').join('')+'</div><div class="mb-6"><label class="block text-sm font-medium text-gray-700 mb-1">Votre nom *</label><input class="w-full border border-gray-300 rounded-lg px-4 py-2.5 text-gray-900 focus:outline-none focus:ring-2 focus:ring-amber-400" id="cpn" placeholder="Votre nom complet"></div><div id="cpr" class="hidden mb-4 p-4 bg-green-50 border border-green-200 rounded-xl"><p class="text-sm text-green-800 mb-2 font-semibold">Reponse generee ! Copiez ce lien :</p><input class="w-full border border-green-300 rounded-lg px-3 py-2 text-xs font-mono text-green-900 bg-white" id="cprl" readonly onclick="this.select()"><button class="pb ps mt-2" onclick="navigator.clipboard.writeText(document.getElementById(\'cprl\').value);this.textContent=\'Copie !\'"><i class="fas fa-copy mr-1"></i> Copier</button></div><button class="pb pa w-full" id="cps" onclick="cpSub(\''+enc+'\')"><i class="fas fa-paper-plane mr-2"></i> Confirmer et generer la reponse</button></div></div>');window._cpC={}}catch(e){document.body.innerHTML='<p style="padding:40px;color:red">Lien invalide.</p>'}
}
function cpV(pid,st){window._cpC[pid]=st;document.getElementById('cb_'+pid).style.display='none';const el=document.getElementById('cs_'+pid);el.classList.remove('hidden');el.innerHTML=st==='valide'?'<span style="color:#2ECC71"><i class="fas fa-check-circle"></i> Valide</span>':'<span style="color:#E74C3C"><i class="fas fa-times-circle"></i> Rejete</span>'}
function cpSub(enc){const nm=document.getElementById('cpn').value.trim();if(!nm){alert('Entrez votre nom');return}const d=JSON.parse(decodeURIComponent(escape(atob(enc))));const r=d.p.map(p=>({id:p.id,s:window._cpC[p.id]||'en_attente',n:nm,d:new Date().toISOString()}));const pl=btoa(unescape(encodeURIComponent(JSON.stringify({v:d.v,r:r}))));const url=location.origin+location.pathname+'#resp='+pl;document.getElementById('cpr').classList.remove('hidden');document.getElementById('cprl').value=url;document.getElementById('cps').style.display='none';document.getElementById('cpr').scrollIntoView({behavior:'smooth'})}

/* === PORTAIL CLIENT SIGNATURE === */
function renderCSig(enc){
  try{const d=JSON.parse(decodeURIComponent(escape(atob(enc))));showP('<div class="min-h-screen flex items-center justify-center p-4" style="background:linear-gradient(135deg,#f8f7f4,#eee9e0)"><div class="pc w-full max-w-lg"><div class="text-center mb-6"><div class="w-12 h-12 rounded-xl bg-amber-100 flex items-center justify-center mx-auto mb-3"><i class="fas fa-signature text-amber-600 text-xl"></i></div><h1 class="text-2xl font-bold text-gray-900">Signature</h1><p class="text-gray-500 text-sm mt-1">Pour : '+d.n+'</p></div><div class="border-2 border-dashed border-gray-300 rounded-xl overflow-hidden mb-4 bg-white relative"><canvas id="cscv" width="500" height="200" class="w-full cursor-crosshair" style="touch-action:none"></canvas><div id="csph" class="absolute inset-0 flex items-center justify-center text-gray-400 text-sm pointer-events-none">Signez ici</div></div><div class="flex gap-3 mb-4"><button class="pb po flex-1" onclick="document.getElementById(\'cscv\').getContext(\'2d\').clearRect(0,0,500,200);document.getElementById(\'csph\').style.display=\'flex\'">Effacer</button><button class="pb pa flex-1" onclick="cpSS(\''+enc+'\')">Signer</button></div><div id="cssr" class="hidden p-4 bg-green-50 border border-green-200 rounded-xl"><p class="text-sm text-green-800 mb-2 font-semibold">Signature enregistree ! Copiez ce lien :</p><input class="w-full border border-green-300 rounded-lg px-3 py-2 text-xs font-mono text-green-900 bg-white" id="cssrl" readonly onclick="this.select()"><button class="pb ps mt-2" onclick="navigator.clipboard.writeText(document.getElementById(\'cssrl\').value)"><i class="fas fa-copy mr-1"></i> Copier</button></div></div></div>');const cv=document.getElementById('cscv');const cx=cv.getContext('2d');cx.strokeStyle='#1a1a1a';cx.lineWidth=2.5;cx.lineCap='round';cx.lineJoin='round';let dr=false;const gp=e=>{const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*(cv.width/r.width),y:(t.clientY-r.top)*(cv.height/r.height)}};cv.onmousedown=e=>{dr=true;const p=gp(e);cx.beginPath();cx.moveTo(p.x,p.y);document.getElementById('csph').style.display='none'};cv.onmousemove=e=>{if(!dr)return;const p=gp(e);cx.lineTo(p.x,p.y);cx.stroke()};cv.onmouseup=cv.onmouseleave=()=>dr=false;cv.ontouchstart=e=>{e.preventDefault();dr=true;const p=gp(e);cx.beginPath();cx.moveTo(p.x,p.y);document.getElementById('csph').style.display='none'};cv.ontouchmove=e=>{if(!dr)return;e.preventDefault();const p=gp(e);cx.lineTo(p.x,p.y);cx.stroke()};cv.ontouchend=()=>dr=false}catch(e){document.body.innerHTML='<p style="padding:40px;color:red">Lien invalide.</p>'}
}
function cpSS(enc){const cv=document.getElementById('cscv');const bk=document.createElement('canvas');bk.width=cv.width;bk.height=cv.height;if(cv.toDataURL()===bk.toDataURL()){alert('Signez d\'abord');return}const d=JSON.parse(decodeURIComponent(escape(atob(enc))));const pl=btoa(unescape(encodeURIComponent(JSON.stringify({c:d.c,s:cv.toDataURL('image/jpeg',0.7)}))));const url=location.origin+location.pathname+'#sigresp='+pl;document.getElementById('cssr').classList.remove('hidden');document.getElementById('cssrl').value=url;cv.parentElement.parentElement.querySelector('.flex.gap-3').style.display='none';document.getElementById('cssr').scrollIntoView({behavior:'smooth'})}
function importSResp(enc){showM('Importer une signature','<p class="text-sm text-muted mb-3">Collez le lien de signature :</p><input class="ip font-mono text-xs mb-4" id="sri" value="#sigresp='+enc+'"><div class="flex gap-3 justify-end"><button class="b bs" onclick="closeM()">Annuler</button><button class="b bp" onclick="procSR()">Importer</button></div>')}
function procSR(){let v=document.getElementById('sri').value.trim();if(v.includes('#sigresp='))v=v.split('#sigresp=')[1];try{const d=JSON.parse(decodeURIComponent(escape(atob(v))));const s=gs(K.sg);s[d.c]=d.s;ss(K.sg,s);closeM();toast('Signature importee !','success');if(pg==='signature')rSig(document.getElementById('ct'))}catch(e){toast('Lien invalide','error')}}

</script>

  const extra=type==='devis'?'Valide jusqu\'au '+fd(item.dateValidite):'Echeance : '+fd(item.dateEcheance);
  const html='<div style="width:800px;padding:50px;font-family:Helvetica,Arial,sans-serif;color:#1a1a1a;background:#fff"><div style="display:flex;justify-content:space-between;margin-bottom:40px"><div>'+(st.logo?'<img src="'+st.logo+'" style="max-height:60px;max-width:220px;object-fit:contain;margin-bottom:10px;display:block">':'')+'<div style="font-size:24px;font-weight:700;color:#0C0E14">'+(st.nom||'')+'</div><div style="font-size:12px;color:#666;margin-top:6px;line-height:1.6">'+(st.adresse||'')+'<br>'+(st.email||'')+(st.tel?' - '+st.tel:'')+(st.siret?'<br>SIRET : '+st.siret:'')+'</div></div><div style="text-align:right"><div style="font-size:32px;font-weight:700;color:#E8A832;letter-spacing:2px">'+lbl+'</div><div style="font-size:14px;font-weight:600;margin-top:8px">'+item.numero+'</div><div style="font-size:12px;color:#666;margin-top:4px">'+fd(item.date)+'</div><div style="font-size:12px;color:#666">'+extra+'</div></div></div><div style="background:#f8f7f4;border-radius:10px;padding:20px;margin-bottom:30px"><div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:6px">Client</div><div style="font-size:16px;font-weight:600">'+(cl?.nom||'-')+'</div><div style="font-size:12px;color:#666;line-height:1.6">'+(cl?.entreprise||'')+'<br>'+(cl?.adresse||'')+'<br>'+(cl?.email||'')+'</div></div><table style="width:100%;border-collapse:collapse;margin-bottom:24px"><thead><tr style="border-bottom:2px solid #E8A832"><th style="text-align:left;padding:10px 0;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#999">Description</th><th style="text-align:right;padding:10px 0;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#999;width:60px">Qte</th><th style="text-align:right;padding:10px 0;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#999;width:100px">Prix unit.</th><th style="text-align:right;padding:10px 0;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#999;width:100px">Total</th></tr></thead><tbody>'+item.lignes.map(l=>'<tr style="border-bottom:1px solid #eee"><td style="padding:12px 0;font-size:13px">'+l.description+'</td><td style="padding:12px 0;font-size:13px;text-align:right">'+l.quantite+'</td><td style="padding:12px 0;font-size:13px;text-align:right">'+fm(l.prixUnitaire,item.devise)+'</td><td style="padding:12px 0;font-size:13px;text-align:right;font-weight:600">'+fm(l.total,item.devise)+'</td></tr>').join('')+'</tbody></table><div style="display:flex;justify-content:flex-end"><div style="width:250px"><div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:#666"><span>HT</span><span>'+fm(item.totalHT,item.devise)+'</span></div><div style="display:flex;justify-content:space-between;padding:6px 0;font-size:13px;color:#666"><span>TVA ('+tvxOf(item)+'%)</span><span>'+fm(item.totalTVA,item.devise)+'</span></div><div style="display:flex;justify-content:space-between;padding:10px 0;font-size:18px;font-weight:700;border-top:2px solid #E8A832;margin-top:6px;color:#0C0E14"><span>Total TTC</span><span style="color:#E8A832">'+fm(item.totalTTC,item.devise)+'</span></div></div></div>'+(sg[item.clientId]?'<div style="margin-top:40px;padding-top:20px;border-top:1px solid #eee"><div style="font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#999;margin-bottom:10px">Signature</div><img src="'+sg[item.clientId]+'" style="height:70px;background:#f8f7f4;padding:8px;border-radius:6px"></div>':'')+(item.notes?'<div style="margin-top:20px;padding:14px;background:#f8f7f4;border-radius:8px;font-size:12px;color:#666">'+item.notes+'</div>':'')+'<div style="margin-top:40px;text-align:center;font-size:10px;color:#bbb">'+(st.nom||'')+'</div></div>';
  if(!window.html2canvas||!window.jspdf){toast('PDF indisponible : bibliotheques non chargees (verifiez la connexion internet)','error');return}
  const ct=document.createElement('div');ct.innerHTML=html;ct.style.cssText='position:fixed;left:-9999px;top:0';document.body.appendChild(ct);
  const qrOn=st.qrEnabled!==false;
  const qrHtml=(qrOn&&st.iban)?qrBillHTML(item,type,cl,st):null;
  let ctQr=null;
  if(qrHtml){ctQr=document.createElement('div');ctQr.innerHTML=qrHtml;ctQr.style.cssText='position:fixed;left:-9999px;top:0';document.body.appendChild(ctQr)}
  try{
    toast('Generation PDF...','info');
    const canvas=await html2canvas(ct.firstElementChild,{scale:2,useCORS:true,backgroundColor:'#fff'});
    const img=canvas.toDataURL('image/jpeg',0.95);
    const{jsPDF}=window.jspdf;const pdf=new jsPDF('p','mm','a4');
    const pw=pdf.internal.pageSize.getWidth(),ph=pdf.internal.pageSize.getHeight();
    const iw=pw-20,ih=canvas.height*iw/canvas.width;
    let y=10,hl=ih;pdf.addImage(img,'JPEG',10,y,iw,ih);hl-=(ph-20);
    while(hl>0){y=hl-ih+10;pdf.addPage();pdf.addImage(img,'JPEG',10,y,iw,ih);hl-=(ph-20)}
    if(ctQr){
      const qrCanvas=await html2canvas(ctQr.firstElementChild,{scale:3,useCORS:true,backgroundColor:'#fff'});
      const qrImg=qrCanvas.toDataURL('image/jpeg',0.98);
      pdf.addPage();
      pdf.addImage(qrImg,'JPEG',0,ph-105,pw,105);
    }else if(type==='facture'&&qrOn&&!st.iban){
      toast('QR-facture non incluse : configurez vos coordonnees bancaires dans Parametres','info');
    }
    pdf.save(item.numero+'.pdf');
    toast('PDF exporte','success');
  }catch(e){toast('Erreur PDF','error');console.error(e)}
  finally{document.body.removeChild(ct);if(ctQr)document.body.removeChild(ctQr)}
}

</script>
<script>
/* === PARAMETRES === */
function rPar(C){
  const s=gSt();
  C.innerHTML='<div class="max-w-2xl space-y-6"><div class="cd"><h3 class="font-semibold mb-4"><i class="fas fa-building mr-2 text-accent"></i>Entreprise</h3><p class="text-sm text-muted mb-4">Ces informations apparaissent sur les devis et factures PDF.</p><div class="space-y-4"><div><label>Nom</label><input class="ip" id="sn" value="'+(s.nom||'')+'"></div><div><label>Adresse</label><textarea class="ip" id="sa" rows="2">'+(s.adresse||'')+'</textarea></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label>Email</label><input class="ip" id="se" type="email" value="'+(s.email||'')+'"></div><div><label>Telephone</label><input class="ip" id="stl" value="'+(s.tel||'')+'"></div></div><div><label>SIRET</label><input class="ip" id="ssr" value="'+(s.siret||'')+'"></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label>TVA par defaut (%)</label><input class="ip" id="stv" type="number" min="0" max="100" step="0.1" value="'+(s.tva||20)+'"></div><div><label>Devise par defaut</label><select class="ip" id="sdev"><option value="CHF" '+((s.devise||'CHF')==='CHF'?'selected':'')+'>CHF</option><option value="EUR" '+((s.devise||'CHF')==='EUR'?'selected':'')+'>EUR</option></select></div></div></div><button class="b bp mt-6" id="ssv"><i class="fas fa-save"></i> Enregistrer</button></div><div class="cd"><h3 class="font-semibold mb-4"><i class="fas fa-image mr-2 text-accent"></i>Logo</h3><p class="text-sm text-muted mb-4">Apparait en haut de vos devis et factures PDF. Formats image classiques (PNG/JPG), quelques centaines de Ko max conseille.</p><div class="flex items-center gap-4 mb-4">'+(s.logo?'<img src="'+s.logo+'" style="max-height:70px;max-width:220px;object-fit:contain" class="rounded bg-white p-2">':'<div class="text-muted text-sm">Aucun logo enregistre</div>')+'</div><div class="flex flex-wrap items-center gap-3"><input type="file" accept="image/*" class="ip" style="max-width:280px" id="slg">'+(s.logo?'<button class="b bd sm" id="slgdel"><i class="fas fa-trash"></i> Supprimer le logo</button>':'')+'</div></div><div class="cd"><h3 class="font-semibold mb-4"><i class="fas fa-qrcode mr-2 text-accent"></i>QR-facture (coordonnees bancaires)</h3><p class="text-sm text-muted mb-4">Necessaire pour generer le bulletin de versement QR sur vos devis et factures. IBAN suisse ou liechtensteinois (CH.. / LI..) uniquement. Si votre entreprise n\'est pas basee en Suisse/Europe, ou si vous ne souhaitez pas utiliser ce systeme, desactivez-le simplement ci-dessous.</p><div class="flex items-center justify-between p-3 rounded-lg mb-4" style="background:rgb(var(--c-surface2))"><div><div class="font-medium text-sm">Activer la QR-facture</div><div class="text-xs text-muted">Inclut le bulletin QR sur les PDF exportes et active le bouton d\'apercu</div></div><label style="position:relative;display:inline-block;width:44px;height:24px;flex-shrink:0"><input type="checkbox" id="sqren" '+(s.qrEnabled!==false?'checked':'')+' style="opacity:0;width:0;height:0"><span id="sqrentrack" style="position:absolute;inset:0;background:'+(s.qrEnabled!==false?'rgb(var(--c-accent))':'rgb(var(--c-border))')+';border-radius:24px;transition:.2s;cursor:pointer"></span><span id="sqrenthumb" style="position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s;transform:'+(s.qrEnabled!==false?'translateX(20px)':'translateX(0)')+'"></span></label></div><div class="space-y-4"><div><label>IBAN</label><input class="ip" id="siban" placeholder="CH00 0000 0000 0000 0000 0" value="'+(s.iban||'')+'"><div id="sibanmsg" class="text-xs mt-1"></div></div><div><label>Titulaire du compte (si different du nom de l\'entreprise)</label><input class="ip" id="stit" value="'+(s.titulaire||'')+'"></div><div class="grid grid-cols-1 md:grid-cols-4 gap-4"><div class="md:col-span-2"><label>Rue</label><input class="ip" id="srue" value="'+(s.rue||'')+'"></div><div><label>N&deg;</label><input class="ip" id="srueno" value="'+(s.rueNo||'')+'"></div><div><label>NPA</label><input class="ip" id="snpa" value="'+(s.npa||'')+'"></div></div><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label>Ville</label><input class="ip" id="sville" value="'+(s.ville||'')+'"></div><div><label>Pays</label><input class="ip" id="spays" maxlength="2" style="text-transform:uppercase" value="'+(s.pays||'CH')+'"></div></div></div><button class="b bp mt-6" id="ssvq"><i class="fas fa-save"></i> Enregistrer</button></div><div class="cd"><h3 class="font-semibold mb-4"><i class="fas fa-database mr-2 text-accent"></i>Donnees (NAS / Fichier JSON)</h3><p class="text-sm text-muted mb-4"><strong>Sauvegarder</strong> : ecrit directement un fichier JSON (sur Chrome/Edge, vous pouvez choisir un dossier sur votre NAS et les sauvegardes suivantes seront instantanees).<br><strong>Charger</strong> : importe un fichier JSON precedent. Ecrase les donnees actuelles.</p><div class="flex flex-wrap gap-3"><button class="b bp" onclick="FS.save()"><i class="fas fa-save"></i> Sauvegarder vers fichier</button><button class="b bs" onclick="FS.load()"><i class="fas fa-folder-open"></i> Charger depuis fichier</button><button class="b bd" onclick="cfm(\'Tout supprimer ?\',\'Toutes les donnees seront perdues.\',function(){Object.values(K).forEach(k=>localStorage.removeItem(k));toast(\'Donnees supprimees\',\'success\');render()})"><i class="fas fa-trash"></i> Supprimer tout</button></div></div></div>';
  C.querySelector('#ssv').onclick=()=>{ss(K.st,{...gSt(),nom:document.getElementById('sn').value,adresse:document.getElementById('sa').value,email:document.getElementById('se').value,tel:document.getElementById('stl').value,siret:document.getElementById('ssr').value,tva:parseFloat(document.getElementById('stv').value)||20,devise:document.getElementById('sdev').value});toast('Parametres enregistres','success')};
  C.querySelector('#slg').onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    if(!file.type.startsWith('image/')){toast('Fichier image requis','error');return}
    const r=new FileReader();
    r.onload=ev=>{ss(K.st,{...gSt(),logo:ev.target.result});toast('Logo enregistre','success');render()};
    r.onerror=()=>toast('Erreur de lecture du fichier','error');
    r.readAsDataURL(file);
  };
  C.querySelector('#slgdel')?.addEventListener('click',()=>cfm('Supprimer le logo ?','',function(){const st2=gSt();delete st2.logo;ss(K.st,st2);toast('Logo supprime','success');render()}));
  const ibanMsgEl=C.querySelector('#sibanmsg');
  const checkIban=()=>{
    const v=C.querySelector('#siban').value;
    if(!v.trim()){ibanMsgEl.textContent='';return}
    if(!ibanValid(v)){ibanMsgEl.innerHTML='<span class="text-danger"><i class="fas fa-circle-xmark"></i> IBAN invalide (verifiez le numero)</span>';return}
    ibanMsgEl.innerHTML='<span class="text-success"><i class="fas fa-circle-check"></i> IBAN valide'+(isQrIban(v)?' - QR-IBAN detecte (reference QRR generee automatiquement)':' - reference "sans reference" (NON) utilisee')+'</span>';
  };
  C.querySelector('#siban').addEventListener('input',checkIban);checkIban();
  C.querySelector('#sqren').addEventListener('change',e=>{
    const on=e.target.checked;
    document.getElementById('sqrentrack').style.background=on?'rgb(var(--c-accent))':'rgb(var(--c-border))';
    document.getElementById('sqrenthumb').style.transform=on?'translateX(20px)':'translateX(0)';
    ss(K.st,{...gSt(),qrEnabled:on});
    toast(on?'QR-facture activee':'QR-facture desactivee','success');
  });
  C.querySelector('#ssvq').onclick=()=>{
    const iban=document.getElementById('siban').value;
    if(iban.trim()&&!ibanValid(iban)){toast('IBAN invalide, verifiez le numero avant d\'enregistrer','error');return}
    ss(K.st,{...gSt(),iban:ibanClean(iban),titulaire:document.getElementById('stit').value,rue:document.getElementById('srue').value,rueNo:document.getElementById('srueno').value,npa:document.getElementById('snpa').value,ville:document.getElementById('sville').value,pays:(document.getElementById('spays').value||'CH').toUpperCase()});
    toast('Coordonnees bancaires enregistrees','success');
  };
}

</script>
